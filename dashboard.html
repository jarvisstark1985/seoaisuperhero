<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEOAISuperHero - AI-Powered SEO Dashboard</title>

    <!-- Font Awesome 6 -->

    <!-- Chart.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #10b981;
            --primary-dark: #059669;
            --primary-light: #d1fae5;
            --bg-dark: #0f172a;
            --bg-darker: #0a0e27;
            --bg-card: #1e293b;
            --bg-hover: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --border: #334155;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #3b82f6;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-darker);
            color: var(--text-primary);
            line-height: 1.6;
        }

        /* Layout */
        .container {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: var(--bg-dark);
            border-right: 1px solid var(--border);
            overflow-y: auto;
            padding: 20px 0;
            transition: transform 0.3s ease;
            position: relative;
            z-index: 1000;
        }

        .sidebar.mobile-hidden {
            transform: translateX(-100%);
            position: fixed;
            height: 100vh;
            width: 280px;
        }

        .logo {
            padding: 0 20px 30px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 20px;
        }

        .logo h1 {
            font-size: 22px;
            font-weight: 700;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo p {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 5px;
        }

        .nav-menu {
            list-style: none;
        }

        .nav-item {
            margin: 0;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            color: var(--text-secondary);
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 14px;
            border-left: 3px solid transparent;
        }

        .nav-link:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .nav-link.active {
            background: rgba(16, 185, 129, 0.1);
            color: var(--primary);
            border-left-color: var(--primary);
        }

        .nav-link i {
            width: 20px;
            text-align: center;
        }

        .user-section {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            padding: 20px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 12px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), #3b82f6);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            flex-shrink: 0;
        }

        .user-info span {
            display: block;
        }

        .user-info .name {
            color: var(--text-primary);
            font-weight: 600;
        }

        .user-info .plan {
            color: var(--text-muted);
            font-size: 11px;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: var(--bg-dark);
            border-bottom: 1px solid var(--border);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
        }

        .header-title {
            font-size: 24px;
            font-weight: 600;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .menu-toggle {
            display: none;
            background: none;
            border: none;
            color: var(--text-primary);
            cursor: pointer;
            font-size: 20px;
        }

        .notification-bell {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 18px;
            transition: color 0.2s ease;
        }

        .notification-bell:hover {
            color: var(--primary);
        }

        .logout-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 18px;
            transition: color 0.2s ease;
        }

        .logout-btn:hover {
            color: var(--danger);
        }

        /* Content Area */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
            background: var(--bg-darker);
        }

        .section {
            display: none;
        }

        .section.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Login Screen */
        .login-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--bg-darker);
        }

        .login-container {
            width: 100%;
            max-width: 420px;
        }

        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 40px;
            box-shadow: var(--shadow);
        }

        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .login-logo {
            font-size: 48px;
            margin-bottom: 15px;
            color: var(--primary);
        }

        .login-header h1 {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .login-header p {
            color: var(--text-muted);
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 14px;
            background: var(--bg-darker);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
            transition: border-color 0.2s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
        }

        .subscription-note {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid var(--info);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 25px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .subscription-note i {
            color: var(--info);
            margin-right: 8px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            gap: 8px;
            text-decoration: none;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            width: 100%;
            margin-bottom: 12px;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(16, 185, 129, 0.3);
        }

        .btn-secondary {
            background: var(--bg-hover);
            color: var(--text-primary);
            width: 100%;
        }

        .btn-secondary:hover {
            background: rgba(51, 65, 85, 0.8);
            transform: translateY(-2px);
        }

        .btn-sm {
            padding: 8px 16px;
            font-size: 13px;
            width: auto;
        }

        .btn-sm:hover {
            transform: translateY(-1px);
        }

        .login-footer {
            text-align: center;
            margin-top: 25px;
            color: var(--text-muted);
            font-size: 12px;
        }

        .login-footer a {
            color: var(--primary);
            text-decoration: none;
        }

        /* Cards & Grids */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .kpi-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            transition: all 0.2s ease;
        }

        .kpi-card:hover {
            border-color: var(--primary);
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(16, 185, 129, 0.15);
        }

        .kpi-label {
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .kpi-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 15px;
        }

        .kpi-change {
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .kpi-change.positive {
            color: var(--success);
        }

        .kpi-change.negative {
            color: var(--danger);
        }

        /* Hero Section */
        .hero {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.1), rgba(59, 130, 246, 0.1));
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 40px;
            margin-bottom: 40px;
            text-align: center;
        }

        .hero h2 {
            font-size: 28px;
            margin-bottom: 12px;
        }

        .hero p {
            color: var(--text-muted);
            margin-bottom: 24px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .hero-actions {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* Section Header */
        .section-header {
            margin-bottom: 30px;
        }

        .section-header h2 {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .section-header p {
            color: var(--text-muted);
            font-size: 14px;
        }

        /* Forms */
        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        .input-group input {
            flex: 1;
        }

        .input-group .btn {
            flex-shrink: 0;
        }

        /* Progress Bar */
        .progress-container {
            margin: 30px 0;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 13px;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: var(--bg-hover);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), #3b82f6);
            border-radius: 10px;
            width: 0%;
            transition: width 0.3s ease;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border);
        }

        .tab-button {
            background: none;
            border: none;
            color: var(--text-secondary);
            padding: 12px 0;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s ease;
        }

        .tab-button:hover {
            color: var(--text-primary);
        }

        .tab-button.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        /* Tables */
        .table-container {
            overflow-x: auto;
            margin-bottom: 30px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        thead {
            background: var(--bg-hover);
            border-bottom: 1px solid var(--border);
        }

        th {
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 0.5px;
        }

        td {
            padding: 14px 12px;
            border-bottom: 1px solid var(--border);
        }

        tbody tr:hover {
            background: var(--bg-hover);
        }

        tbody tr:nth-child(even) {
            background: rgba(16, 185, 129, 0.02);
        }

        /* Badges */
        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge-critical {
            background: rgba(239, 68, 68, 0.2);
            color: #fca5a5;
        }

        .badge-warning {
            background: rgba(245, 158, 11, 0.2);
            color: #fcd34d;
        }

        .badge-info {
            background: rgba(59, 130, 246, 0.2);
            color: #93c5fd;
        }

        .badge-success {
            background: rgba(16, 185, 129, 0.2);
            color: #86efac;
        }

        /* Score Gauge */
        .score-gauge {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .gauge {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 700;
            position: relative;
        }

        .gauge-90 {
            background: conic-gradient(#10b981 0deg 324deg, var(--bg-hover) 324deg);
            color: var(--primary);
        }

        .gauge-72 {
            background: conic-gradient(#f59e0b 0deg 259.2deg, var(--bg-hover) 259.2deg);
            color: var(--warning);
        }

        .gauge-85 {
            background: conic-gradient(#10b981 0deg 306deg, var(--bg-hover) 306deg);
            color: var(--primary);
        }

        /* Expandable Section */
        .expandable {
            background: var(--bg-hover);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
        }

        .expandable-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            font-weight: 500;
        }

        .expandable-content {
            display: none;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
            font-size: 13px;
            line-height: 1.6;
        }

        .expandable.open .expandable-content {
            display: block;
        }

        .expandable-icon {
            transition: transform 0.2s ease;
        }

        .expandable.open .expandable-icon {
            transform: rotate(180deg);
        }

        /* Checklist */
        .checklist {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .checklist-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: var(--bg-hover);
            border-radius: 8px;
        }

        .checklist-icon {
            font-size: 16px;
            flex-shrink: 0;
        }

        .checklist-icon.pass {
            color: var(--success);
        }

        .checklist-icon.fail {
            color: var(--danger);
        }

        .checklist-icon.warning {
            color: var(--warning);
        }

        .checklist-text {
            flex: 1;
            font-size: 14px;
        }

        /* Spinner */
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-state {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }

        .loading-state .spinner {
            width: 32px;
            height: 32px;
            border-width: 3px;
            margin-bottom: 15px;
        }

        /* Comparison Card */
        .comparison-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .comparison-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
        }

        .comparison-card h4 {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .comparison-card .value {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 12px;
        }

        .comparison-card .subtext {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .menu-toggle {
                display: block;
            }

            .sidebar {
                position: fixed;
                height: 100vh;
                z-index: 1001;
            }

            .sidebar.mobile-hidden {
                transform: translateX(-100%);
            }

            .header {
                padding: 15px 20px;
            }

            .content {
                padding: 20px;
            }

            .kpi-grid {
                grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
                gap: 15px;
            }

            .hero {
                padding: 25px;
            }

            .tabs {
                gap: 10px;
                overflow-x: auto;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .hero-actions {
                flex-direction: column;
            }

            .hero-actions .btn {
                width: 100%;
            }

            .comparison-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 480px) {
            .kpi-value {
                font-size: 24px;
            }

            .header-title {
                font-size: 18px;
            }

            .hero h2 {
                font-size: 20px;
            }

            table {
                font-size: 12px;
            }

            th, td {
                padding: 8px;
            }
        }
    </style>
</head>
<body>
    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-P2C3KN7T"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->

    <div id="app"></div>

    <script>
        // Application State
        const app = {
            isLoggedIn: false,
            user: {
                name: '',
                email: ''
            },
            currentSection: 'dashboard',
            auditInProgress: false,
            auditProgress: 0
        };

        // Initialize App
        function initApp() {
            const appDiv = document.getElementById('app');

            if (!app.isLoggedIn) {
                appDiv.innerHTML = renderLoginScreen();
            } else {
                appDiv.innerHTML = renderDashboard();
                attachEventListeners();
            }
        }

        // Login Screen
        function renderLoginScreen() {
            return `
                <div class="login-screen">
                    <div class="login-container">
                        <div class="login-card">
                            <div class="login-header">
                                <div class="login-logo">
                                    <i class="fas fa-chart-line"></i>
                                </div>
                                <h1>SEOAISuperHero</h1>
                                <p>AI-Powered SEO Audit & Optimization</p>
                            </div>

                            <form id="loginForm">
                                <div class="form-group">
                                    <label for="email">Email Address</label>
                                    <input type="email" id="email" name="email" placeholder="you@example.com" required>
                                </div>

                                <div class="form-group">
                                    <label for="password">Password</label>
                                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                                </div>

                                <div class="subscription-note">
                                    <i class="fas fa-info-circle"></i>
                                    Requires active paid subscription ($19.99/mo)
                                </div>

                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-sign-in-alt"></i>
                                    Sign In
                                </button>
                            </form>

                            <button type="button" class="btn btn-secondary" onclick="handleSubscribe()">
                                <i class="fas fa-rocket"></i>
                                Subscribe & Create Account
                            </button>

                            <div class="login-footer">
                                <p>Questions? Contact us at <strong>partners@theaisuperheroes.com</strong></p>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // Main Dashboard
        function renderDashboard() {
            return `
                <div class="container">
                    <aside class="sidebar" id="sidebar">
                        <div class="logo">
                            <h1><i class="fas fa-chart-line"></i> SEO AI</h1>
                            <p>Dashboard</p>
                        </div>

                        <ul class="nav-menu">

        // Event Handlers
        function attachEventListeners() {
            const loginForm = document.getElementById('loginForm');

            }

            // Initialize charts
            setTimeout(() => {
                initializeRankingChart();

        function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const name = email.split('@')[0].charAt(0).toUpperCase() + email.split('@')[0].slice(1);

            app.isLoggedIn = true;
            app.user.email = email;
            app.user.name = name;

            gtag('event', 'login', { method: 'email' });

            initApp();
        }

        function handleSubscribe() {
            gtag('event', 'sign_up', { method: 'email' });
            alert('Redirect to subscription page: partners@theaisuperheroes.com');
        }

        function handleLogout() {
            app.isLoggedIn = false;
            gtag('event', 'logout');
            initApp();
        }

        function switchSection(sectionName) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));

            const section = document.querySelector(`[data-section="${sectionName}"]`);
            if (section) {
                section.classList.add('active');
            }

            const navLink = document.querySelector(`[onclick*="${sectionName}"]`);
            if (navLink) {
                navLink.classList.add('active');
            }

            // Update header title
            const titles = {
                dashboard: 'Dashboard',
                audit: 'Site Audit',
                keywords: 'Keyword Research',
                rankings: 'Rank Tracker',
                backlinks: 'Backlink Analyzer',
                content: 'Content Optimizer',
                competitor: 'Competitor Analysis',
                settings: 'Settings'
            };

            document.getElementById('headerTitle').textContent = titles[sectionName] || 'Dashboard';
            app.currentSection = sectionName;

            // Initialize charts on first load
            if (sectionName === 'rankings') {
                setTimeout(() => initializeRankingChart(), 100);
            }
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('mobile-hidden');
        }

        function switchAuditTab(tabName) {
            document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));

            event.target.closest('.tab-button').classList.add('active');
            document.getElementById(`tab${tabName.charAt(0).toUpperCase() + tabName.slice(1)}`).classList.add('active');
        }

        function toggleExpandable(element) {
            const expandable = element.closest('.expandable');
            expandable.classList.toggle('open');
        }

        function startAudit() {
            app.auditInProgress = true;
            app.auditProgress = 0;

            const progressDiv = document.getElementById('auditProgress');
            const resultsDiv = document.getElementById('auditResults');

            progressDiv.style.display = 'block';
            resultsDiv.style.display = 'none';

            gtag('event', 'audit_started');

            const steps = ['Crawling', 'Analyzing', 'Scoring'];
            let stepIndex = 0;

            const interval = setInterval(() => {
                app.auditProgress += Math.random() * 30;

                if (app.auditProgress >= 100) {
                    app.auditProgress = 100;
                    clearInterval(interval);

                    document.getElementById('progressPercent').textContent = '100%';
                    document.getElementById('progressFill').style.width = '100%';
                    document.getElementById('progressStep').textContent = 'Complete!';

                    setTimeout(() => {
                        progressDiv.style.display = 'none';
                        resultsDiv.style.display = 'block';
                        gtag('event', 'audit_completed');
                    }, 800);
                } else {
                    stepIndex = Math.floor((app.auditProgress / 100) * steps.length);
                    if (stepIndex >= steps.length) stepIndex = steps.length - 1;

                    document.getElementById('progressStep').textContent = steps[stepIndex] + '...';
                    document.getElementById('progressPercent').textContent = Math.floor(app.auditProgress) + '%';
                    document.getElementById('progressFill').style.width = app.auditProgress + '%';
                }
            }, 300);
        }
